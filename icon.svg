<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Major Match crest: the champion's ball — the crown every team is playing for -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#061a2e"/>
      <stop offset=".55" stop-color="#0b2e4f"/>
      <stop offset="1" stop-color="#0e3d5c"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".45" r=".6">
      <stop offset="0" stop-color="#f4b740" stop-opacity=".34"/>
      <stop offset="1" stop-color="#f4b740" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ballg" cx=".38" cy=".3" r=".95">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".72" stop-color="#eef3f7"/>
      <stop offset="1" stop-color="#c8d5e0"/>
    </radialGradient>
    <linearGradient id="goldg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffdf8e"/>
      <stop offset=".5" stop-color="#f4b740"/>
      <stop offset="1" stop-color="#d3961f"/>
    </linearGradient>
    <linearGradient id="fair1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f8f47"/>
      <stop offset="1" stop-color="#1c5a31"/>
    </linearGradient>
    <linearGradient id="fair2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e6136"/>
      <stop offset="1" stop-color="#123f22"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="60" cy="70" r="2.6" opacity=".7"/>
    <circle cx="122" cy="42" r="2" opacity=".5"/>
    <circle cx="182" cy="92" r="3" opacity=".85"/>
    <circle cx="258" cy="48" r="2" opacity=".5"/>
    <circle cx="322" cy="32" r="2.5" opacity=".65"/>
    <circle cx="362" cy="112" r="2" opacity=".5"/>
    <circle cx="422" cy="62" r="2.6" opacity=".7"/>
    <circle cx="462" cy="142" r="3" opacity=".8"/>
    <circle cx="80" cy="162" r="2" opacity=".45"/>
    <circle cx="40" cy="262" r="2.4" opacity=".55"/>
    <circle cx="452" cy="242" r="2" opacity=".4"/>
    <circle cx="150" cy="30" r="2" opacity=".4"/>
  </g>

  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- fairway hills -->
  <ellipse cx="316" cy="520" rx="330" ry="98" fill="url(#fair1)"/>
  <ellipse cx="130" cy="548" rx="330" ry="102" fill="url(#fair2)"/>

  <!-- ball shadow -->
  <ellipse cx="256" cy="456" rx="120" ry="19" fill="#000000" opacity=".32"/>

  <!-- the ball -->
  <circle cx="256" cy="344" r="98" fill="url(#ballg)"/>
  <g fill="#b9c6d2" opacity=".6">
    <circle cx="216" cy="318" r="6"/>
    <circle cx="248" cy="308" r="6"/>
    <circle cx="281" cy="317" r="6"/>
    <circle cx="232" cy="346" r="6"/>
    <circle cx="264" cy="339" r="6"/>
    <circle cx="296" cy="349" r="6"/>
    <circle cx="224" cy="375" r="6"/>
    <circle cx="256" cy="368" r="6"/>
    <circle cx="288" cy="380" r="6"/>
    <circle cx="243" cy="400" r="6"/>
    <circle cx="274" cy="401" r="6"/>
  </g>

  <!-- the crown, tipped with a little swagger -->
  <g transform="rotate(-6 256 236)">
    <ellipse cx="256" cy="252" rx="74" ry="12" fill="#0b2e4f" opacity=".18"/>
    <path d="M184 240 L184 190 L221 213 L256 154 L291 213 L328 190 L328 240 Z"
          fill="url(#goldg)" stroke="url(#goldg)" stroke-width="10" stroke-linejoin="round"/>
    <rect x="179" y="232" width="154" height="24" rx="11" fill="url(#goldg)"/>
    <circle cx="184" cy="186" r="9" fill="#ffe9ae"/>
    <circle cx="256" cy="150" r="10" fill="#ffe9ae"/>
    <circle cx="328" cy="186" r="9" fill="#ffe9ae"/>
    <g fill="#08243e" opacity=".28">
      <circle cx="216" cy="244" r="6"/>
      <circle cx="256" cy="244" r="6"/>
      <circle cx="296" cy="244" r="6"/>
    </g>
  </g>

  <!-- sparkle -->
  <path d="M352 128 l5 14 14 5 -14 5 -5 14 -5 -14 -14 -5 14 -5 Z" fill="#ffe9ae" opacity=".9"/>
</svg>
