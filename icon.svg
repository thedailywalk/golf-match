<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Major Match — clean, elevated: deep navy, crisp flag on the green, ghosted wordmark -->
  <style>@media (max-width:120px){ .wordmark{display:none} }</style>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#103a5e"/>
      <stop offset=".55" stop-color="#0b2e4f"/>
      <stop offset="1" stop-color="#06192b"/>
    </linearGradient>
    <radialGradient id="sheen" cx=".5" cy=".26" r=".8">
      <stop offset="0" stop-color="#7fd0ff" stop-opacity=".10"/>
      <stop offset=".6" stop-color="#7fd0ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="greeng" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3fae56"/>
      <stop offset="1" stop-color="#25753c"/>
    </linearGradient>
    <linearGradient id="goldg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd97a"/>
      <stop offset="1" stop-color="#eca827"/>
    </linearGradient>
    <linearGradient id="poleg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d3dde6"/>
    </linearGradient>
    <radialGradient id="ballg" cx=".35" cy=".3" r=".9">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d9e2ea"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#sky)"/>
  <rect width="512" height="512" fill="url(#sheen)"/>

  <!-- big ghosted wordmark, sitting behind the scene -->
  <g class="wordmark" fill="#ffffff" opacity=".11" font-family="Avenir Next, Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="800" text-anchor="middle">
    <text x="256" y="214" font-size="92" letter-spacing="5">FANTASY</text>
    <text x="256" y="310" font-size="92" letter-spacing="24">GOLF</text>
  </g>

  <!-- the green: one clean surface + a whisper of depth -->
  <ellipse cx="256" cy="396" rx="170" ry="48" fill="#0c3b1d" opacity=".55"/>
  <ellipse cx="256" cy="388" rx="166" ry="46" fill="url(#greeng)"/>
  <ellipse cx="234" cy="376" rx="110" ry="24" fill="#ffffff" opacity=".05"/>

  <!-- cup + pole -->
  <ellipse cx="292" cy="392" rx="16" ry="6.5" fill="#082c14"/>
  <rect x="287.5" y="132" width="8" height="260" rx="4" fill="url(#poleg)"/>
  <circle cx="291.5" cy="132" r="7" fill="#ffffff"/>

  <!-- crisp waving pennant -->
  <path d="M296 144 C 352 132 392 152 428 176 C 390 196 348 210 296 218 Z" fill="url(#goldg)"/>
  <path d="M296 144 C 340 136 374 146 402 162 C 368 164 330 166 296 166 Z" fill="#ffffff" opacity=".16"/>

  <!-- ball -->
  <ellipse cx="190" cy="410" rx="38" ry="8" fill="#04200e" opacity=".35"/>
  <circle cx="190" cy="378" r="34" fill="url(#ballg)"/>
  <g fill="#b9c6d2" opacity=".45">
    <circle cx="180" cy="368" r="3.2"/>
    <circle cx="196" cy="364" r="3.2"/>
    <circle cx="186" cy="382" r="3.2"/>
    <circle cx="202" cy="378" r="3.2"/>
    <circle cx="194" cy="392" r="3.2"/>
  </g>

</svg>
