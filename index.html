<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b2e4f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Match">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Major Match Tracker</title>
<style>
  :root{
    --navy:#0b2e4f; --navy-2:#08243e; --ink:#0a1a2b;
    --gold:#f4b740; --gold-soft:#f6c95d;
    --paper:#f7f4ec; --card:#ffffff; --line:#e4ded0;
    --text:#12212f; --muted:#6b7788;
    --good:#1f9d4d; --bad:#d1493b; --even:#5a6675;
    --shadow:0 6px 24px rgba(8,36,62,.10);
    --radius:18px;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#0a1620; --card:#0f2233; --line:#1d3346;
      --text:#e9eef4; --muted:#8ba0b4;
      --good:#3fd07a; --bad:#ff6b5c; --even:#94a6b8;
      --shadow:0 8px 28px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--paper); color:var(--text);
    -webkit-font-smoothing:antialiased; line-height:1.35;
    padding-bottom:calc(84px + var(--safe-b));
  }
  .wrap{max-width:640px; margin:0 auto; padding:0 14px}

  /* Header */
  header{
    background:linear-gradient(180deg,var(--navy),var(--navy-2));
    color:#fff; padding:calc(14px + var(--safe-t)) 14px 16px;
    border-bottom-left-radius:22px; border-bottom-right-radius:22px;
    box-shadow:var(--shadow); position:sticky; top:0; z-index:30;
  }
  .hrow{max-width:640px;margin:0 auto;display:flex;align-items:center;gap:10px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.2px;font-size:16px}
  .brand .dot{width:26px;height:26px;border-radius:8px;background:var(--gold);display:grid;place-items:center;font-size:15px}
  .spacer{flex:1}
  .iconbtn{appearance:none;border:0;background:rgba(255,255,255,.12);color:#fff;width:38px;height:38px;border-radius:11px;font-size:16px;display:grid;place-items:center;cursor:pointer}
  .iconbtn:active{transform:scale(.94)}
  .evline{max-width:640px;margin:10px auto 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .badge{font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:4px 8px;border-radius:999px;background:rgba(255,255,255,.14)}
  .badge.live{background:var(--bad);color:#fff;box-shadow:0 0 0 0 rgba(209,73,59,.6);animation:pulse 1.8s infinite}
  .badge.final{background:rgba(255,255,255,.9);color:var(--navy)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,80,60,.55)}70%{box-shadow:0 0 0 10px rgba(255,80,60,0)}100%{box-shadow:0 0 0 0 rgba(255,80,60,0)}}
  .evname{font-weight:700;font-size:14px}
  .evsub{color:#b9cadb;font-size:12px}

  /* Match summary */
  .summary{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .scoreband{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:14px 12px;gap:6px}
  .tside{text-align:center;min-width:0}
  .tside .nm{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tside .tot{font-size:40px;font-weight:900;letter-spacing:-1px;line-height:1;margin-top:6px}
  .tside .thru{font-size:11px;color:var(--muted);margin-top:4px;height:14px}
  .mid{display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 6px}
  .mid .vs{font-size:11px;color:var(--muted);font-weight:700}
  .lead-pill{font-size:11px;font-weight:800;padding:4px 9px;border-radius:999px;background:var(--gold);color:#3a2a00;white-space:nowrap}
  .lead-pill.tie{background:var(--line);color:var(--muted)}
  .yourtag{font-size:10px;font-weight:800;color:var(--gold);letter-spacing:.4px;text-transform:uppercase;margin-top:3px;height:12px}
  .to-good{color:var(--good)} .to-bad{color:var(--bad)} .to-even{color:var(--even)}
  .tavatar{width:54px;height:54px;border-radius:50%;object-fit:cover;border:2px solid var(--line);display:none;margin:0 auto 7px;box-shadow:0 2px 8px rgba(8,36,62,.18)}
  .thead-av{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,.55);flex:none}
  .photorow{display:flex;align-items:center;gap:12px}
  .av-prev{width:56px;height:56px;border-radius:50%;background:var(--paper) center/cover no-repeat;border:2px dashed var(--line);flex:none;display:grid;place-items:center;color:var(--muted);font-size:20px}
  .av-prev.has{border-style:solid;border-color:var(--gold)}
  .av-prev.has::after{content:''}
  .av-prev:not(.has)::after{content:'🐾'}
  .filepick{cursor:pointer;display:inline-flex;align-items:center}

  /* Notify bar */
  .notifybar{display:flex;align-items:center;gap:10px;padding:10px 12px;border-top:1px solid var(--line);background:linear-gradient(180deg,transparent,rgba(244,183,64,.05))}
  .notifybar .txt{flex:1;font-size:12px;color:var(--muted)}
  .btn{appearance:none;border:0;border-radius:11px;padding:9px 13px;font-weight:800;font-size:13px;cursor:pointer;background:var(--gold);color:#3a2a00}
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
  .btn.on{background:var(--good);color:#04180b}
  .btn.sm{padding:7px 11px;font-size:12px}

  /* Team cards */
  .team{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .team.mine{border-color:var(--gold)}
  .team-h{display:flex;align-items:center;gap:10px;padding:12px 14px;background:linear-gradient(180deg,var(--navy),var(--navy-2));color:#fff}
  .team-h .nm{font-weight:800;font-size:15px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .team-h .tot{font-size:20px;font-weight:900}
  .team-h .mine-star{font-size:12px;color:var(--gold)}
  .cols{display:grid;grid-template-columns:40px 1fr auto;gap:0;padding:6px 12px 2px;color:var(--muted);font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--line)}
  .cols .r{text-align:right}
  .player{display:grid;grid-template-columns:40px 1fr auto;align-items:center;gap:0;padding:11px 12px;border-bottom:1px solid var(--line)}
  .player:last-child{border-bottom:0}
  .player.benched{opacity:.42}
  .chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--line);display:grid;place-items:center;cursor:pointer;background:transparent;font-size:12px;color:#fff}
  .chk.on{background:var(--good);border-color:var(--good)}
  .pinfo{min-width:0;padding-right:8px}
  .pinfo .pn{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pinfo .ps{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:6px;align-items:center}
  .rounds{display:flex;gap:4px;margin-left:6px}
  .rd{font-size:10px;color:var(--muted);background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:1px 5px;font-weight:700}
  .pscore{text-align:right;font-size:22px;font-weight:900;min-width:52px;letter-spacing:-.5px}
  .pscore .man-in{width:56px;font-size:18px;font-weight:800;text-align:right;border:1px solid var(--line);border-radius:8px;padding:4px 6px;background:var(--paper);color:var(--text)}
  .dotlive{width:7px;height:7px;border-radius:50%;background:var(--bad);display:inline-block;animation:pulse 1.8s infinite}

  .rulenote{padding:9px 14px 13px;font-size:11px;color:var(--muted);text-align:center}

  /* Weekend lineup */
  .chk.static{opacity:.5;cursor:default}
  .chk.mc-x{background:transparent;border-color:var(--bad);color:var(--bad);cursor:not-allowed;font-weight:800}
  .mc{color:var(--bad);font-weight:800}
  .pill7{display:inline-block;font-size:9px;font-weight:800;background:var(--gold);color:#3a2a00;border-radius:5px;padding:1px 5px;margin-right:4px;letter-spacing:.4px;vertical-align:middle}
  .seventh{display:flex;gap:8px;align-items:center;padding:11px 12px;border-bottom:1px solid var(--line);font-size:13px}
  .seventh .sev-in{flex:1;min-width:0;font-size:14px;padding:10px 11px;border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--text)}
  .seventh.locked{color:var(--muted)}
  .wk-status{padding:9px 12px;font-size:12px;font-weight:800;text-align:center;border-bottom:1px solid var(--line)}
  .wk-status.ok{color:var(--good)}
  .wk-status.warn{color:var(--bad)}
  .wkbanner{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px}
  .wkbanner.slim{display:flex;align-items:center;gap:12px;justify-content:space-between;font-size:12px;color:var(--muted);padding:12px 14px}
  .wkb-top{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800}
  .wkb-lock{font-size:12px;font-weight:800;color:var(--gold)}
  .wkb-sub{font-size:12px;color:var(--muted);margin:6px 0 11px;line-height:1.45}
  .wkb-actions{display:flex;gap:8px}

  /* Who's phone is this */
  #whoami{display:flex;align-items:center;gap:10px;margin-top:12px;padding:9px 11px;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
  .whoami-label{font-size:12px;font-weight:800;color:var(--muted);white-space:nowrap}
  .whoami-seg{display:flex;gap:6px;flex:1;min-width:0}
  .whoami-seg button{flex:1;min-width:0;padding:9px 8px;border-radius:9px;border:1px solid var(--line);background:var(--paper);color:var(--muted);font-weight:800;font-size:12px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .whoami-seg button.on{background:var(--gold);color:#3a2a00;border-color:var(--gold)}

  /* Tabs */
  .tabs{display:flex;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:5px;margin-top:14px;box-shadow:var(--shadow)}
  .tab{flex:1;border:0;background:transparent;color:var(--muted);font-weight:800;font-size:14px;padding:11px;border-radius:10px;cursor:pointer;transition:.15s}
  .tab.on{background:var(--navy);color:#fff}
  .tab:active{transform:scale(.98)}

  /* Player detail dropdown */
  .pinfo{cursor:pointer}
  .chev{color:var(--muted);font-size:11px;font-weight:700;margin-left:2px}
  .pdetail{padding:2px 12px 14px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(11,46,79,.05),transparent);animation:slidein .18s ease}
  @keyframes slidein{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .pd-stats{display:flex;gap:8px;margin:6px 0 10px}
  .pd-stat{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:9px 6px;text-align:center}
  .pd-stat span{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:800;margin-bottom:3px}
  .pd-stat b{font-size:19px;font-weight:900}
  .pd-rlabel{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:800;margin-bottom:5px}
  .pd-rounds{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:11px}
  .pd-round{display:flex;flex-direction:column;align-items:center;background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:5px 12px;min-width:46px}
  .pd-round span{font-size:10px;color:var(--muted);font-weight:800}
  .pd-round b{font-size:16px;font-weight:800}
  .pd-empty{color:var(--muted);font-size:12px;padding:4px 0 10px}
  .pd-cutbtns{display:flex;gap:8px;margin-bottom:11px}
  .cutbtn{flex:1;padding:9px;border-radius:10px;border:1px solid var(--line);background:var(--paper);color:var(--muted);font-weight:800;font-size:12px;cursor:pointer}
  .cutbtn.sel{background:var(--good);color:#04180b;border-color:var(--good)}
  .cutbtn.miss.sel{background:var(--bad);color:#fff;border-color:var(--bad)}
  .pd-link{display:inline-block;font-size:12px;font-weight:800;color:var(--navy);text-decoration:none;border:1px solid var(--line);border-radius:9px;padding:8px 12px}

  /* Leaderboard (card style) */
  #boardView{margin-top:14px}
  .lb-legend{display:flex;justify-content:space-between;align-items:center;padding:0 10px 10px;color:var(--muted);font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
  .lb-card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
  .lb-card.mine{border-color:var(--gold)}
  .lb-main{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:11px;padding:12px 13px;cursor:pointer}
  .lb-card.mine .lb-main{background:linear-gradient(90deg,rgba(244,183,64,.12),transparent)}
  .lb-card.opp .lb-main{background:linear-gradient(90deg,rgba(11,46,79,.07),transparent)}
  .lb-card.open .lb-main{background:rgba(110,120,255,.11)}
  .lb-ava{position:relative;width:52px;height:52px;flex:none}
  .lb-init{position:absolute;inset:0;display:grid;place-items:center;border-radius:13px;background:var(--navy);color:#fff;font-weight:800;font-size:15px}
  .lb-photo{position:absolute;inset:0;width:52px;height:52px;border-radius:13px;object-fit:cover;object-position:top center;background:var(--paper);border:1px solid var(--line)}
  .lb-num{position:absolute;top:-7px;left:-7px;min-width:22px;height:22px;padding:0 5px;border-radius:11px;background:var(--ink);color:#fff;font-size:11px;font-weight:800;display:grid;place-items:center;border:2px solid var(--card);z-index:2}
  .lb-num.cut{background:var(--bad);font-size:9px}
  .lb-id{min-width:0}
  .lb-nm{font-weight:800;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lb-sub{margin-top:4px}
  .lb-chip{display:inline-block;font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px}
  .lb-chip.mine{background:rgba(244,183,64,.28);color:#7a5600}
  .lb-chip.opp{background:rgba(11,46,79,.12);color:var(--navy)}
  .lb-chip.field{background:var(--paper);color:var(--muted);border:1px solid var(--line)}
  .lb-nums{display:flex;gap:14px;text-align:center}
  .lb-col b{display:block;font-size:20px;font-weight:900;line-height:1.05}
  .lb-col b .dotlive{margin-right:3px}
  .lb-col span{font-size:9px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);font-weight:800}
  .lb-chev{color:var(--muted);font-size:13px;font-weight:700}
  .lb-detail{padding:2px 14px 14px;border-top:1px solid var(--line)}
  .sc-stats{display:flex;gap:8px;margin:12px 0}
  .sc-stat{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:9px 6px;text-align:center}
  .sc-stat span{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:800;margin-bottom:3px}
  .sc-stat b{font-size:18px;font-weight:900}
  .sc-rlabel{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:800;margin:2px 0 7px}
  .sc-rounds{display:flex;gap:8px;flex-wrap:wrap}
  .sc-col{display:flex;flex-direction:column;align-items:center;gap:5px}
  .sc-h{font-size:10px;color:var(--muted);font-weight:800}
  .sc-bub{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-weight:900;font-size:15px;background:var(--paper);border:1px solid var(--line);color:var(--text)}
  .sc-bub.good{background:var(--good);color:#04180b;border-color:transparent}
  .sc-bub.bad{background:var(--bad);color:#fff;border-color:transparent}
  .sc-empty{color:var(--muted);font-size:12px;padding:6px 0}
  .board-empty{padding:30px 18px;text-align:center;color:var(--muted);font-size:13px;background:var(--card);border:1px solid var(--line);border-radius:16px}
  @media (prefers-color-scheme:dark){ .pd-link{color:var(--gold)} .tab.on{background:var(--gold);color:#3a2a00} .lb-chip.mine{background:rgba(244,183,64,.20);color:#ffce6b} .lb-chip.opp{background:rgba(255,255,255,.1);color:var(--text)} .lb-init{background:#1d3346} .lb-card.open .lb-main{background:rgba(120,130,255,.16)} }

  /* generic */
  .section-t{font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:20px 4px 8px}
  .foot{margin:22px 4px 30px;font-size:11px;color:var(--muted);text-align:center;line-height:1.6}
  a{color:inherit}

  /* Edit sheet */
  .sheet-bg{position:fixed;inset:0;background:rgba(4,12,20,.55);backdrop-filter:blur(2px);z-index:50;display:none}
  .sheet-bg.show{display:block}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:51;background:var(--card);border-top-left-radius:22px;border-top-right-radius:22px;box-shadow:0 -10px 40px rgba(0,0,0,.3);transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1);max-height:88vh;overflow:auto;padding-bottom:calc(20px + var(--safe-b))}
  .sheet.show{transform:translateY(0)}
  .sheet-h{position:sticky;top:0;background:var(--card);display:flex;align-items:center;gap:10px;padding:16px 16px 10px;border-bottom:1px solid var(--line)}
  .sheet-h .t{font-weight:800;font-size:16px;flex:1}
  .grip{width:38px;height:4px;border-radius:2px;background:var(--line);margin:8px auto 0}
  .field{padding:12px 16px}
  .field label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:6px}
  .field input[type=text]{width:100%;font-size:16px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:var(--paper);color:var(--text)}
  .editrow{display:flex;gap:8px;align-items:center;padding:8px 16px}
  .editrow input{flex:1;font-size:15px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--text)}
  .editrow .del{background:transparent;border:1px solid var(--line);color:var(--bad);border-radius:9px;width:38px;height:38px;font-size:16px;cursor:pointer}
  .addbtn{margin:6px 16px 4px;width:calc(100% - 32px);border:1px dashed var(--line);background:transparent;color:var(--muted);padding:10px;border-radius:11px;font-weight:700;cursor:pointer}
  .radio-row{display:flex;gap:8px;padding:4px 16px 12px}
  .radio-row button{flex:1;padding:11px;border-radius:11px;border:1px solid var(--line);background:var(--paper);color:var(--text);font-weight:800;cursor:pointer}
  .radio-row button.sel{background:var(--gold);color:#3a2a00;border-color:var(--gold)}
  .toast{position:fixed;left:50%;bottom:calc(96px + var(--safe-b));transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 16px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;transition:.25s;z-index:60;pointer-events:none;box-shadow:var(--shadow)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="brand"><span class="dot">⛳</span> Major Match</div>
    <div class="spacer"></div>
    <button class="iconbtn" id="syncBtn" title="Sync now">↻</button>
    <button class="iconbtn" id="editBtn" title="Edit teams">✎</button>
  </div>
  <div class="evline">
    <span class="badge" id="evStatus">—</span>
    <span class="evname" id="evName">Loading…</span>
    <span class="spacer"></span>
    <span class="evsub" id="updated"></span>
  </div>
</header>

<div class="wrap">
  <div class="tabs">
    <button class="tab on" data-view="match">⛳ Draft</button>
    <button class="tab" data-view="board">🏆 Leaderboard</button>
  </div>

  <div id="whoami"></div>

  <div id="matchView">
  <!-- Match summary -->
  <div class="summary">
    <div class="scoreband">
      <div class="tside">
        <img class="tavatar" id="avA" alt="">
        <div class="nm" id="sA">Team A</div>
        <div class="tot" id="totA">—</div>
        <div class="thru" id="thruA"></div>
        <div class="yourtag" id="yourA"></div>
      </div>
      <div class="mid">
        <div class="vs">VS</div>
        <div class="lead-pill tie" id="leadPill">—</div>

  <div class="field"><label>Team photo</label>
    <div class="photorow">
      <div class="av-prev" id="prevB"></div>
      <label class="btn ghost sm filepick">Choose photo<input type="file" accept="image/*" id="fileB" hidden></label>
      <button class="btn ghost sm" id="rmB">Remove</button>

<div class="toast" id="toast"></div>

<script>
/* ---------------- State ---------------- */
const LS = 'mmt-state-v1';
const DEFAULT = {
  event: 'auto',            // 'auto' = current PGA event
  mine: 'B',                // Princess Lulu
  sync: 'on',
  teams: {
    A: { name: 'Strike Eagle 🦅', players: ['Rory McIlroy','Collin Morikawa','Tyrrell Hatton','Xander Schauffele','Russell Henley','Chris Gotterup'] },
    B: { name: 'Bogey Bird Sparkle Shark', players: ['Scottie Scheffler','Tommy Fleetwood','Matt Fitzpatrick','Jon Rahm','Wyndham Clark','Ludvig Åberg'] }
  },
  bench: {},                // "A:Rory McIlroy" -> true (benched, doesn't count)
  manual: {},               // "A:Rory McIlroy" -> "-2"  (used when sync off)
  avatars: { A: '', B: '' },// team photos, stored as compressed data URLs
  roster7: { A:'', B:'' },  // optional 7th weekend player (must have made the cut)
  startWknd: { A:[], B:[] },// chosen weekend starters (max 4 per team)
  locked: false,            // weekend lineups locked after Friday
  planWknd: false,          // reveal the weekend lineup editor early
  cutSnapshot: {},          // norm name -> to-par snapshot taken at lock (through R2)
  cutOverride: {}           // norm name -> 'made' | 'missed' (manual override of ESPN)
};
let S = load();
function load(){ try{ return Object.assign(structuredClone(DEFAULT), JSON.parse(localStorage.getItem(LS)||'{}')); }catch(e){ return structuredClone(DEFAULT); } }
function save(){ localStorage.setItem(LS, JSON.stringify(S)); }

/* live data: normalizedName -> {toPar, thru, rounds[], live} */
let LIVE = {};
let FIELD = [];             // full field (array) for the leaderboard tab
let EVENT = { name:'', status:'pre', statusText:'', round:0 };
let prevScores = {};        // for change detection (your team)
let hasBaseline = false;
let VIEW = 'match';         // 'match' | 'board'
const expanded = new Set(); // player keys with their stats dropdown open

/* ---------------- Helpers ---------------- */
const $ = (s,r=document)=>r.querySelector(s);
const norm = (s)=> (s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/[^a-z ]/g,'').trim();
const key = (side,name)=> side+':'+name;
function parPretty(v){ if(v===null||v===undefined||v==='') return '—'; const n=Number(v); if(Number.isNaN(n)) return String(v); if(n===0) return 'E'; return n>0? '+'+n : String(n); }
function parClass(v){ if(v===null||v===undefined||v==='') return 'to-even'; const n=Number(v); if(Number.isNaN(n)) return 'to-even'; if(n<0) return 'to-good'; if(n>0) return 'to-bad'; return 'to-even'; }
function toNum(v){ if(v==='E') return 0; const n=Number(v); return Number.isNaN(n)?null:n; }

/* score for one player (respect sync/manual) */
function playerScore(side,name){
  if(S.sync==='off'){ const m=S.manual[key(side,name)]; return (m===undefined||m==='')?null:toNum(m); }
  const l = LIVE[norm(name)];
  return l ? l.toPar : null;
}
function playerLive(name){ return LIVE[norm(name)] || null; }
function isBench(side,name){ return !!S.bench[key(side,name)]; }

/* ---- roster / weekend rules ---- */
function splitKey(k){ const i=k.indexOf(':'); return [k.slice(0,i), k.slice(i+1)]; }
function rosterList(side){ const a=S.teams[side].players.slice(); const s7=S.roster7?.[side]; if(s7) a.push(s7); return a; }
function weekendPlanning(){ return S.locked || (EVENT.round||0)>=2 || S.planWknd; }
function weekendScoring(){ return S.locked; }               // the Friday lock is what switches scoring
function cutOf(name){ const k=norm(name); if(S.cutOverride&&S.cutOverride[k]) return S.cutOverride[k]; return LIVE[k]?.cutStatus || null; }   // manual override wins, else ESPN
function setCut(name, val){ const k=norm(name); if(S.cutOverride[k]===val){ delete S.cutOverride[k]; } else { S.cutOverride[k]=val; } save(); render(); }
function isStarterChosen(side,name){ return (S.startWknd[side]||[]).includes(name); }
function validStarters(side){ const roster=rosterList(side); return (S.startWknd[side]||[]).filter(p=> roster.includes(p) && cutOf(p)!=='missed').slice(0,4); }

/* team total — R1–2: all 6 count · weekend (locked): all-6-through-cut + 4 starters' weekend + penalties */
function teamTotal(side){
  const orig = S.teams[side].players;
  if(S.sync==='off'){                     // manual mode stays simple
    let sum=0, counted=0;
    for(const p of orig){ if(isBench(side,p)) continue; const s=playerScore(side,p); if(s===null) continue; sum+=s; counted++; }
    return { sum, counted, penalty:0, starters:counted, mode:'manual' };
  }
  if(!weekendScoring()){                   // Rounds 1–2: all 6 players count
    let sum=0, counted=0;
    for(const p of orig){ const s=playerScore(side,p); if(s===null) continue; sum+=s; counted++; }
    return { sum, counted, penalty:0, starters:counted, mode:'r12' };
  }
  // Weekend: frozen R1–2 base for all 6 + weekend delta for the 4 starters + penalties
  const snap=S.cutSnapshot||{};
  let base=0, counted=0;
  for(const p of orig){ const k=norm(p); const s=(k in snap)?snap[k]:playerScore(side,p); if(s===null||s===undefined) continue; base+=s; counted++; }
  const strt=validStarters(side);
  let delta=0;
  for(const p of strt){ const k=norm(p); const cur=playerScore(side,p); if(cur===null) continue; const sn=(k in snap)?snap[k]:cur; delta+=(cur-sn); }
  const penalty = 10*Math.max(0, 4-strt.length);
  return { sum: base+delta+penalty, counted, penalty, starters: strt.length, base, delta, mode:'weekend' };
}

function toggleStarter(k){
  const [side,name]=splitKey(k);
  const arr=S.startWknd[side]||(S.startWknd[side]=[]);
  const i=arr.indexOf(name);
  if(i>=0){ arr.splice(i,1); }
  else {
    if(cutOf(name)==='missed'){ toast('That player missed the cut'); return; }
    if(validStarters(side).length>=4){ toast('You already have 4 starters — bench one first'); return; }
    arr.push(name);
  }
  save(); render();
}
function add7(side){
  const inp=document.querySelector(`[data-sev="${side}"]`);
  const val=(inp?.value||'').trim(); if(!val) return;
  if(S.sync==='on' && FIELD.length){
    if(!LIVE[norm(val)]){ toast(`No player named “${val}” in the field`); return; }
    if(cutOf(val)==='missed'){ toast(`${val} missed the cut — not eligible`); return; }
  }
  S.roster7[side]=val; save(); render();
}
function remove7(side){
  const nm=S.roster7[side]; S.roster7[side]='';
  S.startWknd[side]=(S.startWknd[side]||[]).filter(n=>n!==nm);
  save(); render();
}
function lockLineups(){
  const a=validStarters('A').length, b=validStarters('B').length;
  if((a<4||b<4) && !confirm(`Lock now? A team without 4 starters takes +10 per empty slot.\n\n${S.teams.A.name}: ${a}/4\n${S.teams.B.name}: ${b}/4`)) return;
  const snap={};
  for(const k in LIVE){ const v=LIVE[k].toPar; if(v!==null&&v!==undefined) snap[k]=v; }
  S.cutSnapshot=snap; S.locked=true; save(); render(); toast('Weekend lineups locked 🔒');
}
function unlockLineups(){ if(confirm('Unlock the weekend roster? Scores will recompute live until you lock again.')){ S.locked=false; save(); render(); } }

/* ---------------- Rendering ---------------- */
function render(){
  $('#sA').textContent = S.teams.A.name;
  $('#sB').textContent = S.teams.B.name;
  const tA=teamTotal('A'), tB=teamTotal('B');
  const elA=$('#totA'), elB=$('#totB');
  elA.textContent = tA.counted? parPretty(tA.sum) : '—';
  elB.textContent = tB.counted? parPretty(tB.sum) : '—';
  elA.className='tot '+parClass(tA.counted?tA.sum:null);
  elB.className='tot '+parClass(tB.counted?tB.sum:null);

  // lead pill (lower is better)
  const pill=$('#leadPill');
  if(tA.counted && tB.counted){
    if(tA.sum===tB.sum){ pill.textContent='All square'; pill.className='lead-pill tie'; }
    else{ const lead = tA.sum<tB.sum? 'A':'B'; const diff=Math.abs(tA.sum-tB.sum); pill.textContent=`${S.teams[lead].name.split(' ')[0]} +${diff}`; pill.className='lead-pill'; }
  } else { pill.textContent='—'; pill.className='lead-pill tie'; }

  $('#yourA').textContent = S.mine==='A'? '★ My team':'';
  $('#yourB').textContent = S.mine==='B'? '★ My team':'';
  setAvatar('#avA', S.avatars.A); setAvatar('#avB', S.avatars.B);

  // thru summary (players still on course) + any weekend penalty
  $('#thruA').textContent = summaryLine('A');
  $('#thruB').textContent = summaryLine('B');

  // event line
  const st=$('#evStatus');
  $('#evName').textContent = EVENT.name || 'No live event';
  if(EVENT.status==='in'){ st.textContent='Live'+(EVENT.round?` · R${EVENT.round}`:''); st.className='badge live'; }
  else if(EVENT.status==='post'){ st.textContent='Final'; st.className='badge final'; }
  else { st.textContent = EVENT.statusText||'Scheduled'; st.className='badge'; }

  renderWhoami();
  renderWeekendBanner();
  renderTeams();

  // tab switching
  document.querySelectorAll('.tab').forEach(t=> t.classList.toggle('on', t.dataset.view===VIEW));
  $('#matchView').style.display = VIEW==='match' ? '' : 'none';
  $('#boardView').style.display = VIEW==='board' ? '' : 'none';
  if(VIEW==='board') renderBoard();

  $('#foot').innerHTML = 'Scores from ESPN’s public golf feed · matched by player name.<br>Notifications fire while this app is open. Add to Home Screen for the full-screen app.';
}

/* ---------------- Leaderboard tab ---------------- */
function renderBoard(){
  const host=$('#boardView');
  if(S.sync!=='on'){ host.innerHTML='<div class="board-empty">Turn on Live Sync (✎) to see the leaderboard.</div>'; return; }
  if(!FIELD.length){ host.innerHTML='<div class="board-empty">The leaderboard fills in once the round is live.</div>'; return; }
  const oppSide = S.mine==='A'?'B':'A';
  const mineSet=new Set(S.teams[S.mine].players.map(norm));
  const oppSet=new Set(S.teams[oppSide].players.map(norm));
  const sorted=FIELD.slice().sort((a,b)=>{
    const am=a.cutStatus==='missed', bm=b.cutStatus==='missed';
    if(am!==bm) return am?1:-1;               // missed-cut players sink to the bottom
    const an=a.toPar===null, bn=b.toPar===null;
    if(an&&bn) return a.order-b.order;
    if(an) return 1; if(bn) return -1;
    if(a.toPar!==b.toPar) return a.toPar-b.toPar;
    return a.order-b.order;
  });
  let cards='';
  for(const e of sorted){
    const isMine=mineSet.has(e.nm), isOpp=oppSet.has(e.nm);
    const open=expanded.has('lb:'+e.nm);
    const chip = isMine? '<span class="lb-chip mine">★ Your pick</span>'
               : isOpp? '<span class="lb-chip opp">Rival</span>'
               : '<span class="lb-chip field">In the field</span>';
    const thruTxt = e.live? `<span class="dotlive"></span>${(e.thru||'').replace('Thru ','')}` : e.done? 'F' : (e.tee||'–');
    const initials = (e.name.split(' ').map(w=>w[0]).join('')||'?').slice(0,2).toUpperCase();
    cards += `<div class="lb-card${isMine?' mine':isOpp?' opp':''}${open?' open':''}">
      <div class="lb-main" data-lbexp="${e.nm}">
        <div class="lb-ava">
          <span class="lb-init">${esc(initials)}</span>
          ${e.headshot?`<img class="lb-photo" src="${e.headshot}" alt="" onerror="this.remove()">`:''}
          <span class="lb-num${e.cutStatus==='missed'?' cut':''}">${e.cutStatus==='missed'?'CUT':(e.pos||'–')}</span>
        </div>
        <div class="lb-id">
          <div class="lb-nm">${esc(e.name)}</div>
          <div class="lb-sub">${chip}</div>
        </div>
        <div class="lb-nums">
          <div class="lb-col"><b class="${parClass(e.toPar)}">${parPretty(e.toPar)}</b><span>To&nbsp;Par</span></div>
          <div class="lb-col"><b>${thruTxt}</b><span>Thru</span></div>
        </div>
        <span class="lb-chev">${open?'▾':'▸'}</span>
      </div>
      ${open? boardDetail(e):''}
    </div>`;
  }
  host.innerHTML=`<div class="lb-legend"><span>Players</span><span>To Par&nbsp;·&nbsp;Thru</span></div>${cards}`;
  host.querySelectorAll('[data-lbexp]').forEach(el=> el.onclick=()=>{ const k='lb:'+el.dataset.lbexp; expanded.has(k)?expanded.delete(k):expanded.add(k); renderBoard(); });
}

/* expanded scorecard for a leaderboard player */
function boardDetail(e){
  const bubbles = (e.rounds&&e.rounds.length)
    ? `<div class="sc-rounds">${e.rounds.map((r,i)=>{ const v=String(r); const cls=v.startsWith('-')?'good':(v.startsWith('+')?'bad':''); return `<div class="sc-col"><div class="sc-h">R${i+1}</div><div class="sc-bub ${cls}">${esc(v)}</div></div>`; }).join('')}</div>`
    : '<div class="sc-empty">Round scores appear once play begins.</div>';
  const thru = e.live? ((e.thru||'').replace('Thru ','')||'—') : e.done? 'F' : '—';
  return `<div class="lb-detail">
    <div class="sc-stats">
      <div class="sc-stat"><span>Position</span><b>${e.pos||'—'}</b></div>
      <div class="sc-stat"><span>To Par</span><b class="${parClass(e.toPar)}">${parPretty(e.toPar)}</b></div>
      <div class="sc-stat"><span>Thru</span><b>${thru}</b></div>
    </div>
    <div class="sc-rlabel">Round scores</div>
    ${bubbles}
    ${e.card?`<div style="margin-top:12px"><a class="pd-link" href="${e.card}" target="_blank" rel="noopener">Full stats on ESPN ↗</a></div>`:''}
  </div>`;
}

/* stats panel shown under a player when their row is tapped */
function playerDetail(side,p,l){
  const last=esc(p.split(' ').slice(-1)[0]);
  if(!l){ return `<div class="pdetail"><div class="pd-empty">Stats for ${last} appear once Live Sync finds them (check the name spelling in ✎ if it stays blank).</div></div>`; }
  const thru = l.live? (l.thru||'On course') : l.done? 'Finished' : (l.tee?('Tees '+l.tee):'—');
  const stats=[['Position', l.pos||'—'],['Total', parPretty(l.toPar)],['Thru', thru]];
  const rounds = (l.rounds&&l.rounds.length)
    ? `<div class="pd-rounds">${l.rounds.map((r,i)=>`<div class="pd-round"><span>R${i+1}</span><b>${esc(String(r))}</b></div>`).join('')}</div>`
    : '<div class="pd-empty">No round scores yet.</div>';
  const cut = cutOf(p);
  const cutToggle = (weekendPlanning() && !S.locked)
    ? `<div class="pd-rlabel">Cut status</div>
       <div class="pd-cutbtns">
         <button class="cutbtn ${cut!=='missed'?'sel':''}" data-setcut="made::${esc(p)}">Made cut</button>
         <button class="cutbtn miss ${cut==='missed'?'sel':''}" data-setcut="missed::${esc(p)}">Missed cut</button>
       </div>`
    : '';
  return `<div class="pdetail">
    <div class="pd-stats">${stats.map(([k,v])=>`<div class="pd-stat"><span>${k}</span><b class="${k==='Total'?parClass(l.toPar):''}">${v}</b></div>`).join('')}</div>
    <div class="pd-rlabel">Round scores</div>
    ${rounds}
    ${cutToggle}
    ${l.card?`<a class="pd-link" href="${l.card}" target="_blank" rel="noopener">Full stats on ESPN ↗</a>`:''}
  </div>`;
}

function summaryLine(side){
  const t=teamTotal(side);
  const pen = t.penalty ? `+${t.penalty} pen` : '';
  const play = playingSummary(side);
  const lock = (t.mode==='weekend') ? '🔒 weekend' : '';
  return [play, lock, pen].filter(Boolean).join(' · ');
}
function renderWhoami(){
  const el=$('#whoami'); if(!el) return;
  el.innerHTML=`<span class="whoami-label">📱 My team</span>
    <div class="whoami-seg">
      <button class="${S.mine==='A'?'on':''}" data-mine="A">${esc(S.teams.A.name)}</button>
      <button class="${S.mine==='B'?'on':''}" data-mine="B">${esc(S.teams.B.name)}</button>
    </div>`;
  el.querySelectorAll('[data-mine]').forEach(b=> b.onclick=()=>{ S.mine=b.dataset.mine; hasBaseline=false; prevScores={}; save(); render(); toast(`This phone: ${S.teams[S.mine].name}`); });
}
function renderWeekendBanner(){
  const el=$('#weekendBanner'); if(!el) return;
  if(!weekendPlanning()){
    el.style.display='';
    el.innerHTML=`<div class="wkbanner slim"><span>Weekend: 4 starters + optional 7th (cut-makers). Unlocks after Friday.</span><button class="btn ghost sm" id="planBtn">Set up now</button></div>`;
    const pb=$('#planBtn'); if(pb) pb.onclick=()=>{ S.planWknd=true; save(); render(); };
    return;
  }
  el.style.display='';
  el.innerHTML=`<div class="wkbanner">
    <div class="wkb-top"><b>Weekend lineups</b>${S.locked?'<span class="wkb-lock">🔒 Locked</span>':''}</div>
    <div class="wkb-sub">${S.locked
      ? 'Locked for the weekend. Rounds 1–2 counted all 6; now only each team’s 4 starters count.'
      : 'Pick 4 starters per team (bench 2). Add an optional 7th from the cut-makers. Then lock after Friday — empty starter slots cost +10 each.'}</div>
    <div class="wkb-actions">${S.locked
      ? `<button class="btn sm" id="copyCfgBtn">📋 Copy robot config</button><button class="btn ghost sm" id="unlockBtn">Unlock</button>`
      : `<button class="btn sm" id="lockBtn">🔒 Lock weekend lineups</button>`}</div>
  </div>`;
  const lb=$('#lockBtn'); if(lb) lb.onclick=lockLineups;
  const ub=$('#unlockBtn'); if(ub) ub.onclick=unlockLineups;
  const cb=$('#copyCfgBtn'); if(cb) cb.onclick=exportRobotConfig;
}
function exportRobotConfig(){
  const mine=S.mine, opp=(mine==='A'?'B':'A');
  const topicFor=(side)=> side==='B' ? NTFY_TOPIC : OPP_NTFY_TOPIC;  // topics belong to teams: B=Bogey, A=Strike
  const snap={};
  for(const side of ['A','B']){ for(const p of rosterList(side)){ const k=norm(p); if(k in S.cutSnapshot) snap[k]=S.cutSnapshot[k]; } }
  const cfg={
    teamName:S.teams[mine].name, players:S.teams[mine].players,
    opponentName:S.teams[opp].name, opponentPlayers:S.teams[opp].players,
    countBest:6, ntfyServer:'https://ntfy.sh', ntfyTopic:topicFor(mine), opponentTopic:topicFor(opp), notifyOnOpponentMove:false,
    weekend:{ locked:S.locked, starters:validStarters(mine), seventh:S.roster7[mine]||'',
              opponentStarters:validStarters(opp), opponentSeventh:S.roster7[opp]||'', cutSnapshot:snap }
  };
  const txt=JSON.stringify(cfg,null,2);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast('Copied! Paste into robot/config.json on GitHub')).catch(()=>prompt('Copy this into robot/config.json:',txt));
  } else prompt('Copy this into robot/config.json:',txt);
}
function playingSummary(side){
  let onCourse=0, done=0;
  for(const p of S.teams[side].players){
    if(isBench(side,p)) continue;
    const l=playerLive(p); if(!l) continue;
    if(l.live) onCourse++; else if(l.done) done++;
  }
  if(EVENT.status!=='in') return '';
  return onCourse? `${onCourse} on course` : (done? 'all in':'');
}

function renderTeams(){
  const host=$('#teams'); host.innerHTML='';
  const planning = weekendPlanning();
  for(const side of ['A','B']){
    const t=S.teams[side]; const tot=teamTotal(side);
    const mine = S.mine===side;
    const card=document.createElement('div');
    card.className='team'+(mine?' mine':'');
    let rows='';
    for(const p of rosterList(side)){
      const is7 = S.roster7[side] && p===S.roster7[side];
      const l=playerLive(p);
      const s=playerScore(side,p);
      const missed = cutOf(p)==='missed';
      const started = isStarterChosen(side,p) && !missed;
      const rounds = (l&&l.rounds&&l.rounds.length)? `<div class="rounds">${l.rounds.map(r=>`<span class="rd">${r}</span>`).join('')}</div>`:'';
      let statusTxt='';
      if(S.sync==='on'){
        if(missed) statusTxt='<span class="mc">Missed cut</span>';
        else if(l&&l.live) statusTxt=`<span class="dotlive"></span> ${l.thru||'On course'}`;
        else if(l&&l.done) statusTxt='Finished';
        else if(l&&l.tee) statusTxt='Tees '+l.tee;
        else statusTxt='—';
      } else statusTxt='Manual';
      // control column: weekend = starter toggle (cut players locked out); R1–2 = static "counts"
      let ctrl;
      if(planning){
        if(missed) ctrl=`<div class="chk mc-x" title="Missed the cut — can't start">✕</div>`;
        else if(S.locked) ctrl=`<div class="chk ${started?'on':''} static" title="Locked for the weekend">${started?'✓':''}</div>`;
        else ctrl=`<button class="chk ${started?'on':''}" data-start="${key(side,p)}" title="Weekend starter">${started?'✓':''}</button>`;
      } else {
        ctrl=`<div class="chk on static" title="Counts in Rounds 1–2">✓</div>`;
      }
      const scoreCell = (S.sync==='off')
        ? `<input class="man-in" inputmode="text" data-man="${key(side,p)}" value="${S.manual[key(side,p)]??''}" placeholder="–">`
        : `<span class="${parClass(s)}">${parPretty(s)}</span>`;
      const isOpen=expanded.has(key(side,p));
      const dim = (planning && !started) ? ' benched' : '';
      rows += `<div class="player${dim}">
        ${ctrl}
        <div class="pinfo" data-exp="${key(side,p)}"><div class="pn">${esc(p)} ${is7?'<span class="pill7">7TH</span>':''}<span class="chev">${isOpen?'▾':'▸'}</span></div><div class="ps">${statusTxt}${rounds}</div></div>
        <div class="pscore">${scoreCell}</div>
      </div>${isOpen?playerDetail(side,p,l):''}`;
    }
    // 7th roster slot (weekend planning, before lock)
    let seventh='';
    if(planning && !S.locked){
      seventh = S.roster7[side]
        ? `<div class="seventh"><span>7th player: <b>${esc(S.roster7[side])}</b></span><button class="btn ghost sm" data-rm7="${side}">Remove</button></div>`
        : `<div class="seventh"><input class="sev-in" data-sev="${side}" placeholder="Add 7th player (a cut-maker)"><button class="btn sm" data-add7="${side}">Add</button></div>`;
    } else if(S.locked && S.roster7[side]){
      seventh = `<div class="seventh locked"><span>7th player: <b>${esc(S.roster7[side])}</b></span></div>`;
    }
    // lineup status line
    let statusLine='';
    if(planning){
      const n=validStarters(side).length, pen=Math.max(0,4-n)*10;
      let parts=`${S.locked?'🔒 ':''}Starters ${n}/4${pen?` · +${pen} penalty`:' · set'}`;
      if(S.locked && tot.mode==='weekend') parts=`🔒 Thu/Fri ${parPretty(tot.base)} · Wknd ${parPretty(tot.delta)}${pen?` · +${pen}`:''} · ${n}/4`;
      statusLine=`<div class="wk-status ${pen?'warn':'ok'}">${parts}</div>`;
    }
    card.innerHTML=`
      <div class="team-h">
        ${S.avatars[side]?`<img class="thead-av" src="${S.avatars[side]}" alt="">`:''}
        <div class="nm">${esc(t.name)} ${mine?'<span class="mine-star">★</span>':''}</div>
        <div class="tot ${parClass((tot.counted||tot.penalty)?tot.sum:null)}">${(tot.counted||tot.penalty)?parPretty(tot.sum):'—'}</div>
      </div>
      <div class="cols"><div>${planning?'Start':'✓'}</div><div>Player</div><div class="r">To&nbsp;Par</div></div>
      ${rows}
      ${seventh}
      ${statusLine}
      <div class="rulenote">${planning? 'Weekend: 4 starters count. Bench 2 · optional 7th from cut-makers · empty slots = +10 each.' : 'Rounds 1–2: all 6 players count.'}</div>`;
    host.appendChild(card);
  }
  // wire per-render controls
  host.querySelectorAll('[data-start]').forEach(b=> b.onclick=(e)=>{ e.stopPropagation(); toggleStarter(b.dataset.start); });
  host.querySelectorAll('[data-exp]').forEach(el=> el.onclick=()=>{ const k=el.dataset.exp; expanded.has(k)?expanded.delete(k):expanded.add(k); renderTeams(); });
  host.querySelectorAll('[data-man]').forEach(inp=> inp.oninput=()=>{ S.manual[inp.dataset.man]=inp.value.trim(); save(); softUpdateTotals(); });
  host.querySelectorAll('[data-add7]').forEach(b=> b.onclick=()=>add7(b.dataset.add7));
  host.querySelectorAll('[data-rm7]').forEach(b=> b.onclick=()=>remove7(b.dataset.rm7));
  host.querySelectorAll('[data-setcut]').forEach(b=> b.onclick=(e)=>{ e.stopPropagation(); const parts=b.dataset.setcut.split('::'); setCut(parts[1], parts[0]); });
}
function softUpdateTotals(){ // update totals without re-rendering inputs (keeps focus)
  const tA=teamTotal('A'), tB=teamTotal('B');
  $('#totA').textContent=tA.counted?parPretty(tA.sum):'—'; $('#totA').className='tot '+parClass(tA.counted?tA.sum:null);
  $('#totB').textContent=tB.counted?parPretty(tB.sum):'—'; $('#totB').className='tot '+parClass(tB.counted?tB.sum:null);
  const pill=$('#leadPill');
  if(tA.counted&&tB.counted){ if(tA.sum===tB.sum){pill.textContent='All square';pill.className='lead-pill tie';} else {const lead=tA.sum<tB.sum?'A':'B';pill.textContent=`${S.teams[lead].name.split(' ')[0]} +${Math.abs(tA.sum-tB.sum)}`;pill.className='lead-pill';} }
}
const esc=(s)=> String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* team photos: pick from camera roll -> downscale to a small square data URL */
function setAvatar(sel, src){ const el=$(sel); if(!el) return; if(src){ el.src=src; el.style.display='block'; } else { el.removeAttribute('src'); el.style.display='none'; } }
function renderPrev(side){ const p=$('#prev'+side); if(!p) return; const src=S.avatars[side]; p.style.backgroundImage=src?`url(${src})`:''; p.classList.toggle('has',!!src); }
function readAvatar(file, cb){
  const img=new Image(); const url=URL.createObjectURL(file);
  img.onload=()=>{
    const size=200, c=document.createElement('canvas'); c.width=size; c.height=size;
    const ctx=c.getContext('2d'); const s=Math.min(img.width,img.height);
    ctx.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,size,size);
    URL.revokeObjectURL(url); cb(c.toDataURL('image/jpeg',0.82));
  };
  img.onerror=()=>{ URL.revokeObjectURL(url); toast('Could not read that image'); };
  img.src=url;
}

/* ---------------- ESPN sync ---------------- */
const API='https://site.api.espn.com/apis/site/v2/sports/golf/pga/scoreboard';
const NTFY_TOPIC='mmt-413ab7587a6e';       // your phone's alert channel
const OPP_NTFY_TOPIC='mmt-9adac1ebf2a4';   // Trevor's alert channel (Strike Eagle)
let syncing=false;
async function sync(showToastMsg){
  if(S.sync!=='on'){ render(); return; }
  if(syncing) return; syncing=true;
  $('#syncBtn').style.opacity=.4;
  try{
    const r=await fetch(API,{cache:'no-store'});
    const d=await r.json();
    const ev=pickEvent(d);
    if(!ev){ EVENT={name:'No current event',status:'pre',statusText:'None',round:0}; render(); toast('No live PGA event right now'); return; }
    parseEvent(ev);
    detectChanges();
    $('#updated').textContent='Updated '+nowTime();
    render();
    if(showToastMsg) toast('Synced · '+ (EVENT.name||''));
  }catch(e){
    toast('Couldn’t reach ESPN — retrying');
  }finally{ syncing=false; $('#syncBtn').style.opacity=1; }
}
function pickEvent(d){
  const evs=d.events||[]; if(!evs.length) return null;
  // prefer an in-progress event; else the one containing our players; else first
  const inplay=evs.find(e=>e.status?.type?.state==='in');
  if(inplay) return inplay;
  const wanted=new Set([...S.teams.A.players,...S.teams.B.players].map(norm));
  const withPlayers=evs.find(e=> (e.competitions?.[0]?.competitors||[]).some(c=>wanted.has(norm(c.athlete?.displayName))));
  return withPlayers || evs[0];
}
function parseEvent(ev){
  const comp=ev.competitions?.[0]||{};
  const stype=ev.status?.type||{};
  EVENT={
    name: ev.shortName||ev.name||'',
    status: stype.state||'pre',
    statusText: stype.shortDetail||stype.description||'',
    round: ev.status?.period||comp.status?.period||0
  };
  LIVE={}; FIELD=[];
  for(const c of (comp.competitors||[])){
    const nm=norm(c.athlete?.displayName);
    if(!nm) continue;
    const cs=c.status||{};
    const cstate=cs.type?.state;
    const live = cstate==='in';
    const done = cstate==='post' || cs.type?.completed;
    let thru='';
    if(typeof cs.thru==='number'){ thru = cs.thru>=18?'F':('Thru '+cs.thru); }
    else if(cs.thru!=null && cs.thru!=='') thru=String(cs.thru);
    else if(cs.displayValue) thru=cs.displayValue;
    else if(cs.type?.shortDetail) thru=cs.type.shortDetail;
    const rounds=(c.linescores||[]).map(ls=> ls.displayValue||ls.value).filter(v=>v!==undefined&&v!==null&&v!=='');
    const links=c.athlete?.links||[];
    const card=(links.find(l=>l.rel?.includes('playercard'))||links.find(l=>l.rel?.includes('stats'))||links[0]||{}).href||'';
    const pid = c.id || (card.match(/\/id\/(\d+)\//)||[])[1] || '';
    const headshot = pid ? `https://a.espncdn.com/i/headshots/golf/players/full/${pid}.png` : '';
    // cut detection: ESPN flags missed-cut / withdrawn / DQ players in status text
    const stBlob = `${cs.type?.name||''} ${cs.type?.description||''} ${cs.displayValue||''} ${cs.position?.displayName||''}`;
    const missed = /\bcut\b|withdraw|\bwd\b|disqualif|\bdq\b/i.test(stBlob);
    const cutStatus = missed ? 'missed' : ((EVENT.round||0)>=3 && toNum(c.score)!==null ? 'made' : null);
    const entry={
      name: c.athlete?.displayName||'', nm,
      toPar: toNum(c.score),
      thru, live, done, cutStatus,
      tee: (!live&&!done)? (cs.displayValue||cs.type?.shortDetail||'') : '',
      rounds, card, headshot, pos:'', order: c.order||999
    };
    LIVE[nm]=entry; FIELD.push(entry);
  }
  // compute live positions from the field (skip pre-tournament when everyone is even)
  if(EVENT.status!=='pre'){
    const ranked=FIELD.filter(e=>e.toPar!==null && e.cutStatus!=='missed').slice().sort((a,b)=>a.toPar-b.toPar);
    const counts={}; ranked.forEach(e=>counts[e.toPar]=(counts[e.toPar]||0)+1);
    let lastScore=null, lastPos=0;
    ranked.forEach((e,i)=>{ if(e.toPar!==lastScore){ lastPos=i+1; lastScore=e.toPar; } e.pos=(counts[e.toPar]>1?'T':'')+lastPos; });
  }
}

/* ---------------- Change detection + notifications ---------------- */
function detectChanges(){
  if(S.mine!=='A'&&S.mine!=='B') return;
  const side=S.mine;
  const moves=[];
  for(const p of S.teams[side].players){
    if(isBench(side,p)) continue;
    const l=playerLive(p); if(!l||l.toPar===null) continue;
    const k=norm(p); const prev=prevScores[k];
    if(prev!==undefined && prev!==l.toPar){
      const delta=l.toPar-prev; // negative = improved
      moves.push({name:p, from:prev, to:l.toPar, delta});
    }
    prevScores[k]=l.toPar;
  }
  if(!hasBaseline){ hasBaseline=true; return; } // don't notify on first load
  if(moves.length){
    const tot=teamTotal(side);
    const best=moves.sort((a,b)=>a.delta-b.delta)[0];
    const verb = best.delta<0 ? (best.delta<=-2?'eagle!':'birdie') : (best.delta>=2?'double':'bogey');
    const body = `${best.name.split(' ').slice(-1)[0]} ${best.delta<0?'▼':'▲'}${Math.abs(best.delta)} (${verb}) · ${S.teams[side].name} now ${parPretty(tot.sum)}`;
    fireNotify(`${S.teams[side].name} · ${parPretty(tot.sum)}`, body);
  }
}
async function fireNotify(title, body){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  try{
    const reg = await navigator.serviceWorker?.ready;
    if(reg){ reg.active?.postMessage({type:'notify',title,body}); return; }
  }catch(e){}
  try{ new Notification(title,{body,icon:'icon-192.png'}); }catch(e){}
}

/* ---------------- Notify button ---------------- */
async function toggleNotify(){
  if(!('Notification' in window)){ toast('This browser can’t show notifications'); return; }
  if(Notification.permission==='granted'){ setNotifyState(true); toast('You’ll get a buzz when '+S.teams[S.mine].name+' moves'); return; }
  if(Notification.permission==='denied'){ toast('Notifications are blocked in browser settings'); return; }
  const p=await Notification.requestPermission();
  if(p==='granted'){ setNotifyState(true); fireNotify('Notifications on ⛳', `Tracking ${S.teams[S.mine].name}`); }
  else toast('Notifications not enabled');
}
function setNotifyState(on){
  const b=$('#notifyBtn');
  if(on){ b.textContent='🔔 On'; b.classList.add('on'); $('#notifyTxt').textContent=`Buzzing for ${S.teams[S.mine].name} — keep this app open.`; }
  else { b.textContent='🔔 Notify me'; b.classList.remove('on'); }
}

/* ---------------- Edit sheet ---------------- */
function openSheet(){
  $('#nameA').value=S.teams.A.name; $('#nameB').value=S.teams.B.name;
  // label sections + toggle by real team names, and flag which is yours
  $('#secA').textContent = S.teams.A.name + (S.mine==='A' ? '  ★ yours' : '');
  $('#secB').textContent = S.teams.B.name + (S.mine==='B' ? '  ★ yours' : '');
  $('#mineA').textContent = S.teams.A.name;
  $('#mineB').textContent = S.teams.B.name;
  renderRoster('A'); renderRoster('B'); markRadios();
  renderPrev('A'); renderPrev('B');
  $('#sheetBg').classList.add('show'); $('#sheet').classList.add('show');
}
function closeSheet(){ $('#sheetBg').classList.remove('show'); $('#sheet').classList.remove('show'); commitNames(); sync(); }
function markRadios(){
  document.querySelectorAll('#mineRadio button').forEach(b=> b.classList.toggle('sel', b.dataset.mine===S.mine));
  document.querySelectorAll('#syncRadio button').forEach(b=> b.classList.toggle('sel', b.dataset.sync===S.sync));
  const sA=$('#secA'), sB=$('#secB');
  if(sA) sA.textContent = S.teams.A.name + (S.mine==='A'?'  ★ yours':'');
  if(sB) sB.textContent = S.teams.B.name + (S.mine==='B'?'  ★ yours':'');
}
function renderRoster(side){
  const host=$('#roster'+side); host.innerHTML='';
  S.teams[side].players.forEach((p,i)=>{
    const row=document.createElement('div'); row.className='editrow';
    row.innerHTML=`<input value="${esc(p)}" data-side="${side}" data-i="${i}"><button class="del" data-del="${side}:${i}">✕</button>`;
    host.appendChild(row);
  });
  host.querySelectorAll('input').forEach(inp=> inp.oninput=()=>{ S.teams[inp.dataset.side].players[+inp.dataset.i]=inp.value; save(); });
  host.querySelectorAll('[data-del]').forEach(b=> b.onclick=()=>{ const [sd,ix]=b.dataset.del.split(':'); S.teams[sd].players.splice(+ix,1); save(); renderRoster(sd); });
}
function commitNames(){ S.teams.A.name=$('#nameA').value||'Team A'; S.teams.B.name=$('#nameB').value||'Team B'; save(); render(); }

/* ---------------- Misc UI ---------------- */
let toastT;
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2400); }
function nowTime(){ const d=new Date(); return d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}); }

/* ---------------- Wire up ---------------- */
$('#syncBtn').onclick=()=> sync(true);
$('#editBtn').onclick=openSheet;
$('#doneBtn').onclick=closeSheet;
$('#sheetBg').onclick=closeSheet;
$('#notifyBtn').onclick=toggleNotify;
document.querySelectorAll('#mineRadio button').forEach(b=> b.onclick=()=>{ S.mine=b.dataset.mine; hasBaseline=false; prevScores={}; save(); markRadios(); render(); });
document.querySelectorAll('#syncRadio button').forEach(b=> b.onclick=()=>{ S.sync=b.dataset.sync; save(); markRadios(); render(); sync(); });
document.querySelectorAll('.tab').forEach(t=> t.onclick=()=>{ VIEW=t.dataset.view; render(); window.scrollTo(0,0); });
document.querySelectorAll('[data-add]').forEach(b=> b.onclick=()=>{ const sd=b.dataset.add; S.teams[sd].players.push('New player'); save(); renderRoster(sd); });
['A','B'].forEach(side=>{
  const f=$('#file'+side); if(f) f.onchange=()=>{ const file=f.files&&f.files[0]; if(!file) return; readAvatar(file,(data)=>{ S.avatars[side]=data; save(); renderPrev(side); render(); toast('Photo set'); }); f.value=''; };
  const rm=$('#rm'+side); if(rm) rm.onclick=()=>{ S.avatars[side]=''; save(); renderPrev(side); render(); };
});

if(Notification && Notification.permission==='granted') setNotifyState(true);

/* auto-refresh every 60s while visible + on focus */
let timer=setInterval(()=>{ if(document.visibilityState==='visible') sync(); }, 60000);
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') sync(); });

render();
sync();

/* service worker */
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
</script>
