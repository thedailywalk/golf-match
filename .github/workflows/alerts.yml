name: Golf alerts robot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: golf-alerts
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore last-seen scores
        uses: actions/cache/restore@v4
        with:
          path: robot/state.json
          key: golf-state-${{ github.run_id }}
          restore-keys: golf-state-

      - name: Check scores and push alerts
        run: node robot/poll.mjs

      - name: Save last-seen scores
        if: always()
        uses: actions/cache/save@v4
        with:
          path: robot/state.json
          key: golf-state-${{ github.run_id }}
